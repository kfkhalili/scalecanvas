name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cache Supabase Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          # Invalidate when config.toml changes (Postgres major version, CLI version, etc.)
          key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: supabase-docker-${{ runner.os }}-

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Start local Supabase
        # Exclude services not needed for E2E: cuts download from ~800MB to ~250MB
        run: |
          supabase start \
            -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker save \
            $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>') \
            -o /tmp/supabase-images.tar

      - name: Extract Supabase keys
        id: keys
        run: |
          ANON_KEY=$(supabase status -o json | python3 -c "import json,sys; print(json.load(sys.stdin)['ANON_KEY'])")
          SERVICE_KEY=$(supabase status -o json | python3 -c "import json,sys; print(json.load(sys.stdin)['SERVICE_ROLE_KEY'])")
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_key=$SERVICE_KEY" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js dev server
        # Start in background so CI can track it as a real step.
        # reuseExistingServer: true in playwright.config.ts means Playwright
        # will use this instance instead of spawning its own.
        run: pnpm dev &
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ steps.keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.service_key }}

      - name: Wait for Next.js to be ready
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 3; done'

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ steps.keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.service_key }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  migrate:
    needs: [check, e2e]
    # Only deploy migrations on pushes to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        # --db-url avoids needing a personal SUPABASE_ACCESS_TOKEN (account-wide).
        # Only the DB password and project ref are required.
        run: |
          supabase db push --db-url \
            "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_ID}.supabase.co:5432/postgres"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
