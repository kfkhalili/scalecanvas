name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cache Supabase Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          # Invalidate when config.toml changes (Postgres major version, CLI version, etc.)
          key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: supabase-docker-${{ runner.os }}-

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Start local Supabase
        # Exclude services not needed for E2E: cuts download from ~800MB to ~250MB
        run: |
          supabase start \
            -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker save \
            $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>') \
            -o /tmp/supabase-images.tar

      - name: Extract Supabase keys
        id: keys
        run: |
          ANON_KEY=$(supabase status -o json | python3 -c "import json,sys; print(json.load(sys.stdin)['ANON_KEY'])")
          SERVICE_KEY=$(supabase status -o json | python3 -c "import json,sys; print(json.load(sys.stdin)['SERVICE_ROLE_KEY'])")
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_key=$SERVICE_KEY" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js dev server
        # Start in background so CI can track it as a real step.
        # reuseExistingServer: true in playwright.config.ts means Playwright
        # will use this instance instead of spawning its own.
        run: pnpm dev &
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ steps.keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.service_key }}

      - name: Wait for Next.js to be ready
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 3; done'

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ steps.keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.keys.outputs.service_key }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  migrate:
    needs: [check, e2e]
    # Only deploy migrations on pushes to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        # supabase link + db push uses the Management API over HTTPS (port 443).
        # Direct --db-url Postgres connections fail on GitHub-hosted runners
        # because the runners have IPv6 disabled but Supabase resolves to IPv6.
        #
        # The remote DB was bootstrapped manually, so its schema_migrations
        # history doesn't match local files. We reconcile in two steps:
        #   1. Remove the 7 stale round-number rows (left from manual setup)
        #      that have no local file counterpart.
        #   2. Mark all 13 local migration files as already applied so that
        #      db push doesn't try to re-run them against the existing schema.
        # After this one-time repair, only genuinely new local migrations will
        # be applied on future runs.
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase migration repair --status reverted \
            20260219200000 20260219210000 20260219220000 20260219230000 \
            20260221000000 20260221100000 20260221200000 || true
          supabase migration repair --status applied \
            20260219182753 20260220211112 20260221103317 20260221114328 \
            20260221152454 20260221160118 20260221180955 20260221204022 \
            20260221204237 20260221204427 20260224115726 20260226120000 \
            20260226231616 || true
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
