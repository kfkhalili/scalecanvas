<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0F172A"/>

  <!-- Canvas grid dots -->
  <circle cx="8"  cy="8"  r="1.2" fill="#334155"/>
  <circle cx="16" cy="8"  r="1.2" fill="#334155"/>
  <circle cx="24" cy="8"  r="1.2" fill="#334155"/>
  <circle cx="8"  cy="16" r="1.2" fill="#334155"/>
  <circle cx="16" cy="16" r="1.2" fill="#334155"/>
  <circle cx="24" cy="16" r="1.2" fill="#334155"/>
  <circle cx="8"  cy="24" r="1.2" fill="#334155"/>
  <circle cx="16" cy="24" r="1.2" fill="#334155"/>
  <circle cx="24" cy="24" r="1.2" fill="#334155"/>

  <!-- Scale arrow: diagonal bottom-left to top-right -->
  <line x1="9" y1="23" x2="23" y2="9" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrowhead at top-right -->
  <polyline points="15,9 23,9 23,17" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Origin dot at bottom-left -->
  <circle cx="9" cy="23" r="2" fill="#60A5FA"/>
</svg>
